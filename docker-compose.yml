version: "3.8"
services:
  db:
    image: postgres:15
    container_name: foodtag_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: impactpassword123
      POSTGRES_DB: foodtag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
